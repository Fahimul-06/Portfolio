services:
  - type: web
    name: mongodb-portfolio-admin
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        value: "*"
      - key: CALL_ENABLED
        value: "true"
      - key: STUN_URLS
        value: "stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302"
      - key: TURN_URLS
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: CALL_RING_ENABLED
        value: "true"
      - key: CALL_RING_VOLUME
        value: "1"
      - key: CALL_RING_FREQUENCY
        value: "950"
      - key: CALL_RING_INTERVAL_MS
        value: "1200"
      - key: CALL_RING_BEEP_MS
        value: "700"
      - key: CALL_VIBRATION_ENABLED
        value: "true"
      - key: CALL_AUTO_OPEN_INCOMING_PAGE
        value: "true"
      - key: PUBLIC_APP_URL
        sync: false
      - key: BULKSMSBD_ENDPOINT
        value: "https://bulksmsbd.net/api/smsapi"
      - key: BULKSMSBD_API_KEY
        sync: false
      - key: BULKSMSBD_SENDER_ID
        sync: false
      - key: BULKSMSBD_TYPE
        value: "text"
      - key: CALL_SMS_TEXT
        value: "Please open this link to call me live: {{CALL_URL}}"
      - key: VISITOR_TRACKING_ENABLED
        value: "true"
      - key: VISITOR_IP_LOOKUP_ENABLED
        value: "true"
      - key: VISITOR_IP_LOOKUP_PROVIDER
        value: "ipapi"
      - key: UPLOAD_STORAGE
        value: "cloudinary"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: "portfolio"
